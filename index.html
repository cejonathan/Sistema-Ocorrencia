<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Trânsito - Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #5d48e7; 
            --primary-color-hover: #4a3ab7;
            --background-color: #f6f7fb; 
            --card-background: #ffffff;
            --text-primary: #333333;
            --text-secondary: #777777;
            --border-color: #e2e8f0;
            --field-background: #fdfdfd;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
            /* Novo Gradiente Azul Moderno */
            --gradiente-azul: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }

        body { 
            background-color: var(--background-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 15px; 
        }

        #app-principal:not(.escondido) {
            display: flex;
            width: 100%;
            justify-content: center;
        }

        .app-card { 
            background-color: var(--card-background); 
            border-radius: 12px; 
            box-shadow: var(--shadow); 
            width: 100%; 
            max-width: 480px; 
            height: 85vh; 
            min-height: 600px; 
            max-height: 850px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .app-header { background-color: #fcfcfd; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); flex-shrink: 0;}
        .agente-info { display: flex; align-items: center; gap: 12px; }
        .perfil-icon { font-size: 24px; background-color: #f0f2f5; color: var(--text-secondary); width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .info-texto { display: flex; flex-direction: column; }
        .agente-nome { font-weight: 500; color: var(--text-primary); font-size: 16px; }
        .registro-op { font-size: 12px; color: var(--text-secondary); font-weight: 300; }
        .btn-edit { background-color: transparent; color: var(--text-secondary); border: none; font-size: 12px; cursor: pointer; font-weight: 500; }

        .tab-navegacao { display: flex; background-color: #f1f3f7; padding: 10px 20px; gap: 10px; flex-shrink: 0;}
        .btn-tab { flex: 1; padding: 12px 0; background-color: var(--card-background); color: var(--text-secondary); border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .btn-tab:hover { background-color: #fbfbfb; }
        .btn-tab.ativa { background-color: var(--primary-color); color: white; }

        #tab-content {
            flex: 1 1 auto; 
            overflow-y: auto; 
            background-color: var(--card-background);
        }

        .tab-painel { display: none; padding: 25px 20px; }
        .tab-painel.ativo { display: block; }

        .sub-navegacao { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-subtab { flex: 1; padding: 10px; background-color: #e2e8f0; color: #4a5568; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-subtab.ativa { background-color: var(--primary-color); color: white; }
        .sub-tela { display: none; }
        .sub-tela.ativa { display: block; }

        .caixa-historico { background-color: var(--field-background); border: 1px dashed #ccc; border-radius: 8px; padding: 20px; text-align: center; color: var(--text-secondary); }

        .campo-grupo { margin-bottom: 15px; width: 100%; }
        .campo-row { display: flex; gap: 15px; }
        .campo-row .campo-grupo { flex: 1; }
        label { display: block; margin-bottom: 8px; font-size: 12px; color: var(--text-secondary); font-weight: 700; letter-spacing: 0.5px;}

        input, select, textarea {
            width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--field-background); font-size: 15px; color: var(--text-primary);
        }
        
        .busca-container { display: flex; gap: 5px; margin-bottom: 15px; }
        .busca-container input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); }
        .btn-busca { width: auto !important; padding: 10px 15px !important; margin-top: 0 !important; }

        .btn-container { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 20px; }
        .btn-acao { width: 100%; padding: 16px; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primario { background-color: var(--primary-color); color: white; }
        .btn-primario:hover { background-color: var(--primary-color-hover); }
        .btn-secundario { background-color: #f1f3f7; color: var(--text-primary); }
        .btn-alerta { background-color: #dc3545; color: white; }

        /* PAINEL AZUL GRADIENTE MODERNO */
        .status-box { 
            background: var(--gradiente-azul); 
            border: none;
            border-radius: 12px; 
            padding: 20px; 
            text-align: center; 
            margin-bottom: 15px;
            color: white;
            box-shadow: 0 4px 15px rgba(30, 60, 114, 0.3);
        }
        .status-box h3 { color: #ffffff; margin-bottom: 10px; font-size: 18px; font-weight: bold;}
        .status-box p { color: rgba(255, 255, 255, 0.9); font-size: 14px; margin-bottom: 5px; }

        .escondido { display: none !important; }
        .mt-2 { margin-top: 10px; }
        .mt-4 { margin-top: 20px; }
    </style>
</head>
<body>

    <div id="tela-login" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #f4f4f9; padding: 20px; width: 100%;">
        <div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;">
            <h2 style="color: #2c3e50; margin-bottom: 25px;">🚔 Sistema Operacional</h2>
            <form id="formLogin">
                <input type="email" id="login-email" placeholder="E-mail" required style="margin-bottom: 15px;">
                <input type="password" id="login-senha" placeholder="Senha" required style="margin-bottom: 20px;">
                <button type="submit" id="btn-login" style="width: 100%; padding: 14px; background-color: #0d6efd; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">ENTRAR</button>
            </form>
        </div>
    </div>

    <div id="app-principal" class="escondido">
        <div class="app-card">
            
            <div class="app-header">
                <div class="agente-info">
                    <span class="perfil-icon">👤</span>
                    <div class="info-texto">
                        <span class="agente-nome">Agente Trânsito</span>
                        <span class="registro-op">SISTEMA OPERACIONAL</span>
                    </div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-edit" onclick="fazerLogout()" style="background-color: #dc3545; color: white; border-color: #dc3545; padding: 4px 8px; border-radius: 4px; border: none;">SAIR</button>
                </div>
            </div>

            <div class="tab-navegacao">
                <button class="btn-tab ativa" onclick="abrirAba('tab-viatura')">VIATURA</button>
                <button class="btn-tab" onclick="abrirAba('tab-ocorrencia')">OCORRÊNCIAS</button>
                <button class="btn-tab" onclick="abrirAba('tab-relatorio')">RELATÓRIOS</button>
            </div>

            <div id="tab-content">
                
                <div id="tab-viatura" class="tab-painel ativo">
                    <div class="sub-navegacao">
                        <button class="btn-subtab ativa" onclick="abrirSubTela('sub-km-form', this)">REGISTRAR KM</button>
                        <button class="btn-subtab" onclick="abrirSubTela('sub-km-historico', this)">HISTÓRICO</button>
                    </div>

                    <div id="sub-km-form" class="sub-tela ativa">
                        <div id="tela-abrir-km">
                            <form id="formKM">
                                <div class="campo-grupo">
                                    <label>VIATURA</label>
                                    <select id="km-viatura" onchange="verificarOutro(this, 'km-viatura-outro')" required></select>
                                    <input type="text" id="km-viatura-outro" class="escondido mt-2" placeholder="Digite a viatura manualmente">
                                </div>
                                <div class="campo-row">
                                    <div class="campo-grupo">
                                        <label>CONDUTOR</label>
                                        <select id="km-condutor" onchange="verificarOutro(this, 'km-condutor-outro')" required></select>
                                        <input type="text" id="km-condutor-outro" class="escondido mt-2" placeholder="Digite o condutor">
                                    </div>
                                    <div class="campo-grupo">
                                        <label>APOIO (Opcional)</label>
                                        <select id="km-apoio" onchange="verificarOutro(this, 'km-apoio-outro')"></select>
                                        <input type="text" id="km-apoio-outro" class="escondido mt-2" placeholder="Digite o apoio">
                                    </div>
                                </div>
                                <div class="campo-grupo">
                                    <label>DATA</label>
                                    <input type="date" id="km-data" required>
                                </div>
                                <div class="campo-row">
                                    <div class="campo-grupo">
                                        <label>KM INICIAL</label>
                                        <input type="number" id="km-inicial" required>
                                    </div>
                                    <div class="campo-grupo">
                                        <label>HORA INICIAL</label>
                                        <input type="time" id="km-hora-inicial" required>
                                    </div>
                                </div>
                                <div class="btn-container">
                                    <button type="submit" class="btn-acao btn-primario">ABRIR KM</button>
                                </div>
                            </form>
                        </div>
                        <div id="tela-km-aberto" class="escondido">
                            <div class="status-box">
                                <h3>🔵 Viatura em Operação</h3>
                                <p id="info-vtr-ativa"></p>
                                <p id="info-equipe-ativa"></p>
                                <p id="info-hora-ativa" style="font-weight: bold; margin-top: 5px;"></p>
                            </div>
                            <form id="formFecharKM">
                                <div class="campo-row mt-4">
                                    <div class="campo-grupo">
                                        <label>KM FINAL</label>
                                        <input type="number" id="km-final" required>
                                    </div>
                                    <div class="campo-grupo">
                                        <label>HORA FINAL</label>
                                        <div style="display:flex; gap:5px;">
                                            <input type="time" id="km-hora-final">
                                            <button type="button" onclick="setHoraAtual('km-hora-final')" style="padding: 0 10px; border-radius:4px; border:1px solid #ccc;">⏱️</button>
                                        </div>
                                    </div>
                                </div>
                                <div class="btn-container">
                                    <button type="button" class="btn-acao btn-secundario" onclick="editarKM()">✎ EDITAR ABERTURA</button>
                                    <button type="submit" class="btn-acao btn-alerta">FECHAR KM</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div id="sub-km-historico" class="sub-tela">
                        <div class="busca-container">
                            <input type="text" id="busca-km" placeholder="Buscar VTR ou Condutor...">
                            <button class="btn-acao btn-primario btn-busca" onclick="carregarHistoricoKM(document.getElementById('busca-km').value)">🔎</button>
                        </div>
                        <div class="caixa-historico">
                            <p>Carregando histórico...</p>
                        </div>
                    </div>
                </div>

                <div id="tab-ocorrencia" class="tab-painel">
                    <div class="sub-navegacao">
                        <button class="btn-subtab ativa" onclick="abrirSubTela('sub-oc-form', this)">REGISTRAR OCORRÊNCIA</button>
                        <button class="btn-subtab" onclick="abrirSubTela('sub-oc-historico', this)">HISTÓRICO</button>
                    </div>
                    <div id="sub-oc-form" class="sub-tela ativa">
                        <div id="tela-oc-form">
                            <form id="formOcorrencia">
                                <div class="campo-grupo">
                                    <label>VIATURA</label>
                                    <select id="oc-viatura" required></select>
                                </div>
                                <div class="campo-row">
                                    <div class="campo-grupo">
                                        <label>CONDUTOR</label>
                                        <select id="oc-condutor" required></select>
                                    </div>
                                    <div class="campo-grupo">
                                        <label>APOIO</label>
                                        <select id="oc-apoio"></select>
                                    </div>
                                </div>
                                <div class="campo-grupo">
                                    <label>CÓDIGO DA OCORRÊNCIA</label>
                                    <select id="oc-codigo" required></select>
                                </div>
                                <div class="campo-row">
                                    <div class="campo-grupo">
                                        <label>LOCAL (SETOR)</label>
                                        <select id="oc-local" required></select>
                                    </div>
                                    <div class="campo-grupo">
                                        <label>HORA INICIAL</label>
                                        <input type="time" id="oc-hora-inicial" required>
                                    </div>
                                </div>
                                <div class="btn-container">
                                    <button type="submit" id="btnEnviarOc" class="btn-acao btn-primario">ABRIR OCORRÊNCIA</button>
                                    <button type="button" id="btnVerAbertas" class="btn-acao btn-secundario escondido" onclick="mostrarOcorrenciasAtivas()">VER OCORRÊNCIAS EM ANDAMENTO</button>
                                </div>
                            </form>
                        </div>
                        <div id="tela-oc-ativas" class="escondido">
                            <div id="lista-ocorrencias-ativas"></div>
                            <div class="btn-container">
                                <button type="button" class="btn-acao btn-primario" onclick="prepararNovaOcorrencia()">+ REGISTRAR NOVA OCORRÊNCIA</button>
                            </div>
                        </div>
                    </div>

                    <div id="sub-oc-historico" class="sub-tela">
                        <div class="busca-container">
                            <input type="text" id="busca-oc" placeholder="Buscar código, local ou obs...">
                            <button class="btn-acao btn-primario btn-busca" onclick="carregarHistoricoOC(document.getElementById('busca-oc').value)">🔎</button>
                        </div>
                        <div class="caixa-historico">
                            <p>Carregando histórico...</p>
                        </div>
                    </div>
                </div>

                <div id="tab-relatorio" class="tab-painel">
                    <div class="sub-navegacao">
                        <button class="btn-subtab ativa" onclick="abrirSubTela('sub-rel-form', this)">ABRIR RELATÓRIO</button>
                        <button class="btn-subtab" onclick="abrirSubTela('sub-rel-historico', this)">HISTÓRICO</button>
                    </div>
                    <div id="sub-rel-form" class="sub-tela ativa">
                        <form id="formRelatorio">
                            <div class="campo-grupo">
                                <label>TÍTULO DO RELATÓRIO</label>
                                <input type="text" id="rel-titulo" required>
                            </div>
                            <div class="campo-grupo">
                                <label>DESCRIÇÃO DETALHADA</label>
                                <textarea id="rel-texto" rows="10" required></textarea>
                            </div>
                            <div class="btn-container">
                                <button type="submit" class="btn-acao btn-primario">ENVIAR RELATÓRIO</button>
                            </div>
                        </form>
                    </div>

                    <div id="sub-rel-historico" class="sub-tela">
                        <div class="busca-container">
                            <input type="text" id="busca-rel" placeholder="Buscar por título ou conteúdo...">
                            <button class="btn-acao btn-primario btn-busca" onclick="carregarHistoricoRel(document.getElementById('busca-rel').value)">🔎</button>
                        </div>
                        <div class="caixa-historico">
                            <p>Carregando histórico...</p>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
