<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agente Trânsito - Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gradiente-menu: linear-gradient(135deg, #5d48e7 0%, #4a3ab7 100%);
            /* Novo Gradiente Dark para os Painéis de Status */
            --gradiente-dark: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            
            --background-color: #f6f7fb; 
            --card-background: #ffffff;
            --text-primary: #333333;
            --text-secondary: #777777;
            --border-color: #e2e8f0;
            --field-background: #fdfdfd;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--background-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }

        .app-card { 
            background-color: var(--card-background); border-radius: 12px; box-shadow: var(--shadow); 
            width: 100%; max-width: 480px; height: 85vh; min-height: 600px; max-height: 850px; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        .app-header { background-color: #fcfcfd; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); flex-shrink: 0;}
        .tab-navegacao { display: flex; background-color: #f1f3f7; padding: 10px 20px; gap: 10px; flex-shrink: 0;}
        
        .btn-tab { flex: 1; padding: 12px 0; background: #f1f3f7; color: var(--text-secondary); border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .btn-tab.ativa { background: var(--gradiente-menu); color: white; box-shadow: 0 4px 10px rgba(93, 72, 231, 0.3); }

        .sub-navegacao { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-subtab { flex: 1; padding: 10px; background-color: #e2e8f0; color: #4a5568; border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .btn-subtab.ativa { background: var(--gradiente-menu); color: white; }

        #tab-content { flex: 1 1 auto; overflow-y: auto; padding: 20px; }
        .tab-painel { display: none; }
        .tab-painel.ativo { display: block; }

        /* ESPAÇAMENTO RESTAURADO ENTRE CAMPOS */
        .campo-grupo { margin-bottom: 18px; }
        .campo-row { display: flex; gap: 12px; margin-bottom: 18px; }
        .campo-row .campo-grupo { flex: 1; margin-bottom: 0; }

        label { display: block; margin-bottom: 6px; font-size: 12px; color: var(--text-secondary); font-weight: 700; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--field-background); font-size: 15px; }

        /* PAINEL STATUS DARK GRADIENTE */
        .status-box { 
            background: var(--gradiente-dark); 
            border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; color: white; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .status-box h3 { color: #ffffff; margin-bottom: 8px; font-size: 17px; font-weight: 700; }
        .status-box p { color: rgba(255,255,255,0.8); font-size: 14px; }

        .btn-acao { width: 100%; padding: 16px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; border: none; }
        .btn-primario { background: var(--gradiente-menu); color: white; margin-top: 10px; }
        .btn-alerta { background: #dc3545; color: white; margin-top: 10px; }
        
        .escondido { display: none !important; }
    </style>
</head>
<body>

    <div id="tela-login" class="escondido"> <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: var(--shadow); width: 350px; text-align: center;">
            <h2 style="margin-bottom: 20px;">🚔 Login</h2>
            <form id="formLogin">
                <input type="email" id="login-email" placeholder="E-mail" required style="margin-bottom:10px;">
                <input type="password" id="login-senha" placeholder="Senha" required style="margin-bottom:20px;">
                <button type="submit" id="btn-login" class="btn-acao btn-primario">ENTRAR</button>
            </form>
        </div>
    </div>

    <div id="app-principal" class="escondido">
        <div class="app-card">
            <div class="app-header">
                <div class="agente-info"><b>Agente Trânsito</b></div>
                <button onclick="fazerLogout()" style="background:#dc3545; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">SAIR</button>
            </div>

            <div class="tab-navegacao">
                <button class="btn-tab ativa" onclick="abrirAba('tab-viatura')">VIATURA</button>
                <button class="btn-tab" onclick="abrirAba('tab-ocorrencia')">OCORRÊNCIAS</button>
                <button class="btn-tab" onclick="abrirAba('tab-relatorio')">RELATÓRIOS</button>
            </div>

            <div id="tab-content">
                <div id="tab-viatura" class="tab-painel ativo">
                    <div id="tela-abrir-km">
                        <form id="formKM">
                            <div class="campo-grupo"><label>VIATURA</label><select id="km-viatura"></select></div>
                            <div class="campo-row">
                                <div class="campo-grupo"><label>CONDUTOR</label><select id="km-condutor"></select></div>
                                <div class="campo-grupo"><label>APOIO</label><select id="km-apoio"></select></div>
                            </div>
                            <div class="campo-row">
                                <div class="campo-grupo"><label>KM INICIAL</label><input type="number" id="km-inicial"></div>
                                <div class="campo-grupo"><label>HORA INICIAL</label><input type="time" id="km-hora-inicial"></div>
                            </div>
                            <button type="submit" class="btn-acao btn-primario">ABRIR KM</button>
                        </form>
                    </div>
                    <div id="tela-km-aberto" class="escondido">
                        <div class="status-box">
                            <h3>🚔 Viatura em Operação</h3>
                            <p id="info-vtr-ativa"></p>
                            <p id="info-equipe-ativa"></p>
                            <p id="info-hora-ativa"></p>
                        </div>
                        <form id="formFecharKM">
                            <div class="campo-row">
                                <div class="campo-grupo"><label>KM FINAL</label><input type="number" id="km-final"></div>
                                <div class="campo-grupo"><label>HORA FINAL</label><input type="time" id="km-hora-final"></div>
                            </div>
                            <button type="submit" class="btn-acao btn-alerta">FECHAR KM</button>
                        </form>
                    </div>
                </div>

                <div id="tab-ocorrencia" class="tab-painel">
                    <div id="tela-oc-form">
                        <form id="formOcorrencia">
                            <div class="campo-grupo"><label>VIATURA</label><select id="oc-viatura"></select></div>
                            <div class="campo-row">
                                <div class="campo-grupo"><label>CONDUTOR</label><select id="oc-condutor"></select></div>
                                <div class="campo-grupo"><label>APOIO</label><select id="oc-apoio"></select></div>
                            </div>
                            <div class="campo-grupo"><label>CÓDIGO DA OCORRÊNCIA</label><select id="oc-codigo"></select></div>
                            <div class="campo-row">
                                <div class="campo-grupo"><label>LOCAL</label><select id="oc-local"></select></div>
                                <div class="campo-grupo"><label>HORA INICIAL</label><input type="time" id="oc-hora-inicial"></div>
                            </div>
                            <button type="submit" class="btn-acao btn-primario">ABRIR OCORRÊNCIA</button>
                        </form>
                    </div>
                    <div id="tela-oc-ativas" class="escondido">
                        <div id="lista-ocorrencias-ativas"></div>
                        <button type="button" class="btn-acao btn-primario" onclick="prepararNovaOcorrencia()">+ REGISTRAR NOVA OCORRÊNCIA</button>
                    </div>
                </div>

                <div id="tab-relatorio" class="tab-painel">
                    <form id="formRelatorio">
                        <div class="campo-grupo"><label>TÍTULO</label><input type="text" id="rel-titulo"></div>
                        <div class="campo-grupo"><label>RELATÓRIO</label><textarea id="rel-texto" rows="10"></textarea></div>
                        <button type="submit" class="btn-acao btn-primario">ENVIAR RELATÓRIO</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
